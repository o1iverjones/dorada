name: Deploy API

on:
  push:
    branches: [main]
    paths:
      - "apps/api/**"
      - "packages/types/**"
      - "packages/utils/**"
      - ".github/workflows/deploy-api.yml"

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1
  SERVICE_NAME: pulpito-api
  WORKER_SERVICE_NAME: pulpito-worker
  REGISTRY: us-central1-docker.pkg.dev

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.REGISTRY }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build API image
        run: |
          docker build \
            -f apps/api/Dockerfile \
            -t ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/pulpito/${{ env.SERVICE_NAME }}:${{ github.sha }} \
            -t ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/pulpito/${{ env.SERVICE_NAME }}:latest \
            .

      - name: Push API image
        run: docker push --all-tags ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/pulpito/${{ env.SERVICE_NAME }}

      - name: Run DB migrations
        run: |
          gcloud run jobs create migrate-${{ github.sha }} \
            --image=${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/pulpito/${{ env.SERVICE_NAME }}:${{ github.sha }} \
            --command="node" \
            --args="dist/scripts/migrate.js" \
            --region=${{ env.REGION }} \
            --set-secrets=DATABASE_URL=DATABASE_URL:latest \
            --execute-now \
            --wait \
            --project=${{ env.PROJECT_ID }}

      - name: Deploy API to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          image: ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/pulpito/${{ env.SERVICE_NAME }}:${{ github.sha }}
          region: ${{ env.REGION }}
          flags: --min-instances=1 --max-instances=10 --port=3000 --memory=512Mi

      - name: Deploy Worker to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.WORKER_SERVICE_NAME }}
          image: ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/pulpito/${{ env.SERVICE_NAME }}:${{ github.sha }}
          region: ${{ env.REGION }}
          flags: --command=node --args=dist/workers/index.js --min-instances=1 --max-instances=3 --memory=1Gi
