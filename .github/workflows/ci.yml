name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  typecheck-and-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace packages
        run: pnpm --filter @dorada/types build && pnpm --filter @dorada/utils build

      - name: Generate Prisma client
        run: pnpm --filter @dorada/api db:generate

      - name: Typecheck all packages
        run: pnpm typecheck

      - name: Lint all packages
        run: pnpm lint

  test:
    runs-on: ubuntu-latest
    needs: typecheck-and-lint
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: dorada
          POSTGRES_PASSWORD: dorada
          POSTGRES_DB: dorada_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @dorada/api db:generate

      - name: Run database migrations
        working-directory: apps/api
        env:
          DATABASE_URL: postgresql://dorada:dorada@localhost:5432/dorada_test
        run: pnpm db:migrate:deploy

      - name: Run tests
        env:
          DATABASE_URL: postgresql://dorada:dorada@localhost:5432/dorada_test
          REDIS_URL: redis://localhost:6379
          REDIS_HOST: localhost
          REDIS_PORT: "6379"
          JWT_SECRET: test-secret-at-least-32-characters-long
          NODE_ENV: test
        run: pnpm test
